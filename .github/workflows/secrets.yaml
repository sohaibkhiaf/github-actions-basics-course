# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json


name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Check existing secret
        run: |
          echo "Testing EXISTING secret..."
          if [ -z "${{ secrets.TEST_SECRET }}" ]; then
            echo "❌ TEST_SECRET is NOT set"
          else
            echo "✅ TEST_SECRET exists"
          fi

      - name: Check missing secret
        run: |
          echo "Testing MISSING secret..."
          if [ -z "${{ secrets.NOT_EXIST_SECRET }}" ]; then
            echo "❌ NOT_EXIST_SECRET is NOT set"
          else
            echo "✅ NOT_EXIST_SECRET exists"
          fi